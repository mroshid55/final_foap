<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message</title>
    <style>
        body {
            font-family: Arial;
        }

        .success {
            border: 5px dotted #bbb;
            width: 80%;
            border-radius: 15px;
            margin: 0 auto;
            max-width: 600px;
        }

        .container {
            padding: 2px 16px;
            background-color: #f1f1f1;
        }

        .myButton {
            box-shadow: inset 0px 39px 0px -24px #e67a73;
            background-color: #F48460;
            border-radius: 4px;
            border: 1px solid #ffffff;
            display: inline-block;
            cursor: pointer;
            color: #ffffff;
            font-family: Arial;
            font-size: 15px;
            padding: 6px 15px;
            text-decoration: none;
            text-shadow: 0px 1px 0px #b23e35;

            &:hover {
                background-color: #eb675e;
            }

            &:active {
                position: relative;
                top: 1px;
            }
    </style>
</head>

<body>


    <div class="success">
        <div class="container">
            <h3>Foundation For Orphan Autistic & Pregnant</h3>
        </div>
        <div class="container" style="background-color:white">
            <h2><b>Almost finished...</b></h2>
            <p>We have received your email and would like to thank you for newsletters subcribe to us.</p>
            <p>This will gurantee you will receive all my messages.</p>
        </div>
        <div class="container">
            <a class="myButton" href="{% url 'index' %}" role="button">Home Page</a>
        </div>
    </div>

</body>

</html>
